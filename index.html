<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konversi Suhu</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container{
            background:white;
            padding:35px;
            border-radius:20px;
            width:350px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            animation:muncul 1s ease;
        }

        @keyframes muncul{
            from{
                transform:translateY(-30px);
                opacity:0;
            }
            to{
                transform:translateY(0);
                opacity:1;
            }
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#0077ff;
        }

        input, select{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:2px solid #ddd;
            border-radius:10px;
            outline:none;
            transition:0.3s;
        }

        input:focus, select:focus{
            border-color:#0077ff;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#0077ff;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0056cc;
            transform:scale(1.03);
        }

        .hasil{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            color:#333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Konversi Suhu</h1>

        <input type="number" id="suhu" placeholder="Masukkan suhu">

        <select id="dari">
            <option value="C">Celcius</option>
            <option value="F">Fahrenheit</option>
            <option value="K">Kelvin</option>
        </select>

        <select id="ke">
            <option value="C">Celcius</option>
            <option value="F">Fahrenheit</option>
            <option value="K">Kelvin</option>
        </select>

        <button onclick="konversiSuhu()">Konversi</button>

        <div class="hasil" id="hasil"></div>
    </div>

    <script>
        function konversiSuhu(){
            let suhu = parseFloat(document.getElementById("suhu").value);
            let dari = document.getElementById("dari").value;
            let ke = document.getElementById("ke").value;
            let hasil;

            if(isNaN(suhu)){
                alert("Masukkan suhu terlebih dahulu!");
                return;
            }

            // Konversi ke Celcius dulu
            if(dari == "F"){
                suhu = (suhu - 32) * 5/9;
            }else if(dari == "K"){
                suhu = suhu - 273.15;
            }

            // Dari Celcius ke tujuan
            if(ke == "F"){
                hasil = (suhu * 9/5) + 32;
            }else if(ke == "K"){
                hasil = suhu + 273.15;
            }else{
                hasil = suhu;
            }

            document.getElementById("hasil").innerHTML =
                hasil.toFixed(2) + " °" + ke;
        }
    </script>

</body>
</html>
